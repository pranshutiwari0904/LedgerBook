services:
  - type: web
    name: ledgerbook-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm run start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: CLIENT_ORIGINS
        sync: false
